<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="app">
        <!-- Visual Feedback -->
        <div class="preview-area" id="previewArea">
            <div class="preview-grid">
                <div class="preview-card" id="browserPreview">
                    <div class="browser-mockup" id="mockupBrowser">
                        <div class="browser-tab">
                            <img id="faviconImage" class="icon-small" src="">
                            <span id="tabTitle">New Tab</span>
                        </div>
                    </div>
                    <span class="label">Browser</span>
                </div>
                <div class="preview-card">
                    <div class="app-mockup">
                        <div class="app-icon-container">
                            <img id="appIconImage" class="icon-large" src="">
                        </div>
                    </div>
                    <span class="label">PWA</span>
                </div>
            </div>
        </div>

        <!-- Inputs -->
        <div class="settings-area">
            <div class="input-group">
                <input type="text" id="siteName" placeholder="Website Name" autocomplete="off">
            </div>
            
            <div class="color-row">
                <div class="color-field">
                    <div class="color-swatch">
                        <input type="color" id="themeColor" value="#ffffff">
                    </div>
                    <label title="The color of the browser address bar (mobile) and task switcher.">Theme <span class="info-icon">?</span></label>
                </div>
                <div class="color-field">
                    <div class="color-swatch">
                        <input type="color" id="bgColor" value="#ffffff">
                    </div>
                    <label title="The background color for the Apple Touch Icon and manifest.">Background <span class="info-icon">?</span></label>
                </div>
                <div class="theme-toggle">
                   <button id="togglePreviewTheme" class="icon-button" title="Toggle Preview Theme">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 10C8.20914 10 10 8.20914 10 6C10 3.79086 8.20914 2 6 2C3.79086 2 2 3.79086 2 6C2 8.20914 3.79086 10 6 10Z" stroke="currentColor" stroke-width="1.2"/></svg>
                   </button>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="footer">
            <button id="exportBtn" disabled>Export Bundle</button>
            <div id="status" class="status-text">Select a frame</div>
        </div>

        <!-- Hidden Code Section -->
        <div id="codeOutput" class="code-area hidden">
            <div class="code-header">
                <span>Installation Code</span>
                <button id="copyBtn">Copy</button>
            </div>
            <pre id="htmlCode"></pre>
        </div>
    </div>
</body>
</html>
