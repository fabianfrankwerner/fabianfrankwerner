<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="app">
        <!-- Inputs -->
        <div class="settings-area">
            <div class="aligned-row">
                <div class="aligned-left">
                    <input type="text" id="siteName" placeholder="Title" autocomplete="off">
                </div>
                <div class="aligned-right">
                    <div class="color-group">
                        <div class="color-field">
                            <div class="color-swatch">
                                <input type="color" id="bgColor" value="#e0e0e0">
                            </div>
                            <label>Background</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Visual Feedback -->
        <div class="preview-area">
            <div class="aligned-row">
                <!-- Left: Browser + Toggle -->
                <div class="aligned-left">
                    <div class="browser-wrapper">
                        <div class="browser-mockup" id="mockupBrowser">
                            <div class="browser-tab">
                                <img id="faviconImage" class="icon-small" src="">
                                <span id="tabTitle">Stella</span>
                            </div>
                        </div>
                    </div>
                    <!-- Toggle Button -->
                    <button id="togglePreviewTheme" class="theme-toggle-btn icon-only" title="Toggle Light/Dark Preview">
                        <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm0 14A6 6 0 0 1 8 2v12z"/></svg>
                    </button>
                </div>
                
                <!-- Right: App Icon -->
                <div class="aligned-right">
                    <div class="app-wrapper">
                        <div class="app-mockup">
                            <div class="app-icon-container">
                                <img id="appIconImage" class="icon-large" src="">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="footer">
            <button id="exportBtn" disabled>Export Bundle</button>
            <div id="status" class="status-text">Select a frame</div>
        </div>

        <!-- Code Section -->
        <div id="codeOutput" class="code-area">
            <div class="code-header">
                <span>Code</span>
                <button id="copyBtn">Copy</button>
            </div>
            <pre id="htmlCode"></pre>
        </div>
    </div>
</body>
</html>
