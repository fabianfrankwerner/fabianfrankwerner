<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Exporter</title>
</head>
<body>
    <!-- Main Content -->
    <div id="mainContent">
        
        <!-- Preview Section (Now at the top) -->
        <div class="preview-container" id="previewContainer">
            <div class="row" style="margin-bottom: 12px;">
                <p class="section-title" style="margin-bottom: 0;">Preview</p>
                
                <!-- Preview Theme Toggle -->
                <div id="previewThemeToggleContainer" class="toggle-wrapper" style="margin: 0; padding: 0; border: none; display: flex;">
                    <span style="font-size: 10px; color: var(--figma-color-text-secondary); margin-right: 8px;">Dark Preview</span>
                    <label class="switch" style="transform: scale(0.8);">
                        <input type="checkbox" id="previewThemeToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            
            <div class="preview-row">
                <div class="preview-item">
                    <span class="preview-label">Browser Tab</span>
                    <div class="mockup-browser-container" id="mockupBrowserContainer">
                        <div class="mockup-browser-tab" id="mockupBrowserTab">
                            <img id="previewFavicon" class="mockup-favicon" src="">
                            <span id="previewTabTitle" class="mockup-title-text">New Tab</span>
                            <div class="mockup-close-x"></div>
                        </div>
                    </div>
                </div>

                <div class="preview-item">
                    <span class="preview-label">Home Screen</span>
                    <div class="mockup-home-screen">
                        <img id="previewAppIcon" class="mockup-app-icon" src="">
                        <span id="previewAppName" class="mockup-app-name">App</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Fields -->
        <div id="proFields" style="margin-top: 24px;">
            <div class="section">
                <p class="section-title">Settings</p>
                <div class="control-group">
                    <div class="input-wrapper">
                        <label for="websiteName">Website Name</label>
                        <input type="text" id="websiteName" placeholder="My Awesome Site">
                    </div>
                    
                    <div class="row">
                        <div class="input-wrapper">
                            <label>Theme Color</label>
                            <div class="color-picker-row">
                                <input type="color" id="themeColor" value="#ffffff">
                                <span style="font-size: 11px; color: var(--figma-color-text-secondary)">Browser Theme</span>
                            </div>
                        </div>
                        <div class="input-wrapper">
                            <label>Background</label>
                            <div class="color-picker-row">
                                <input type="color" id="bgColor" value="#ffffff">
                                <span style="font-size: 11px; color: var(--figma-color-text-secondary)">Apple/PWA</span>
                            </div>
                        </div>
                    </div>

                    <div class="input-wrapper">
                        <label>Dark Mode Icon</label>
                        <div class="row">
                            <span id="darkModeSelectionName" style="font-size: 11px; color: var(--figma-color-text-secondary);">Same as Light</span>
                            <button id="selectDarkModeBtn" class="secondary" style="width: auto; padding: 4px 8px; font-size: 11px;">Select Current</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 24px;">
            <button id="generateBtn" disabled>Export Favicon Bundle</button>
            <div id="status" class="status">Select a frame to begin.</div>
        </div>

        <!-- HTML Code Section -->
        <div id="htmlCodeSection" class="hidden" style="margin-top: 24px;">
            <p class="section-title">Installation Code</p>
            <div class="code-wrapper">
                <pre id="htmlCodeDisplay"></pre>
                <button id="copyHtmlBtn" class="secondary small">Copy HTML</button>
            </div>
        </div>
    </div>
</body>
</html>
