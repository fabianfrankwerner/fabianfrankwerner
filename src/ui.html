<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="app">
        <!-- Visual Feedback -->
        <div class="preview-area" id="previewArea">
            <div class="preview-grid">
                <div class="preview-card" id="browserPreview">
                    <div class="browser-mockup" id="mockupBrowser">
                        <div class="browser-tab">
                            <img id="faviconImage" class="icon-small" src="">
                            <span id="tabTitle">New Tab</span>
                        </div>
                    </div>
                    <span class="label">Web</span>
                </div>
                
                <div class="toggle-container">
                    <div class="connector-line"></div>
                    <button id="togglePreviewTheme" class="theme-toggle-btn icon-only" title="Toggle Light/Dark Preview">
                        <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm0 14A6 6 0 0 1 8 2v12z"/></svg>
                    </button>
                    <div class="connector-line"></div>
                </div>

                <div class="preview-card">
                    <div class="app-mockup">
                        <div class="app-icon-container">
                            <img id="appIconImage" class="icon-large" src="">
                        </div>
                    </div>
                    <span class="label">App</span>
                </div>
            </div>
        </div>

        <!-- Inputs -->
        <div class="settings-area">
            <div class="settings-row">
                <input type="text" id="siteName" placeholder="Website Name" autocomplete="off">
                <div class="color-group">
                    <div class="color-field">
                        <div class="color-swatch">
                            <input type="color" id="bgColor" value="#e0e0e0">
                        </div>
                        <label>Background</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="footer">
            <button id="exportBtn" disabled>Export Bundle</button>
            <div id="status" class="status-text">Select a frame</div>
        </div>

        <!-- Code Section -->
        <div id="codeOutput" class="code-area">
            <div class="code-header">
                <span>Code</span>
                <button id="copyBtn">Copy HTML</button>
            </div>
            <pre id="htmlCode"></pre>
        </div>
    </div>
</body>
</html>
